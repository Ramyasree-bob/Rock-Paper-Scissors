<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎮 Rock Paper Scissors</h1>

<h2>Select Game Mode</h2>

<div class="mode-buttons">
    <button id="computer-mode">🖥️ Player vs Computer</button>
    <button id="player-mode">👥 Player vs Player</button>
</div>

<h3 id="mode-text">Current Mode: Player vs Computer</h3>

<h2 id="turn">Your Turn</h2>

<div class="choices">
    <button id="rock">✊ Rock</button>
    <button id="paper">✋ Paper</button>
    <button id="scissors">✌️ Scissors</button>
</div>

<h2 id="result">Choose your move!</h2>

<div class="score-board">

    <div class="score">
        <h3 id="player1-name">Player 1</h3>
        <p id="player1-score">0</p>
    </div>

    <div class="score">
        <h3 id="player2-name">Computer</h3>
        <p id="player2-score">0</p>
    </div>

</div>

<button id="reset">🔄 Reset Game</button>
    <script src="script.js"></script>
</body>
</html>
